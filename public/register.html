<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiReserva - Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="scripts/tailwind-config.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/theme.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 py-12">

  <div class="w-full max-w-lg">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-600 text-white text-2xl mb-4 shadow-lg shadow-emerald-100">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Crea tu cuenta</h1>
        <p class="text-slate-500 font-medium mt-1">Únete a la mejor comunidad deportiva.</p>
    </div>

    <div class="bg-white rounded-3xl shadow-card border border-slate-100 p-8 md:p-10">
        <form id="registerForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="regEmail" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all text-slate-700"
                            placeholder="juan@ejemplo.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Usuario</label>
                    <div class="relative">
                        <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="regUsername" required
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all text-slate-700"
                            placeholder="juan_gol">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Nombre Completo</label>
                <div class="relative">
                    <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="regName" required
                        class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all text-slate-700"
                        placeholder="Juan Pérez">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="regPassword" required minlength="6"
                        class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all text-slate-700"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-4">¿Cómo usarás MiReserva?</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="relative cursor-pointer group">
                        <input type="radio" name="role" value="player" checked class="peer sr-only">
                        <div class="p-4 border-2 border-slate-200 rounded-xl text-center group-hover:border-emerald-200 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition-all">
                            <i class="fas fa-running text-xl mb-2 text-slate-400 group-hover:text-emerald-500 peer-checked:text-emerald-600"></i>
                            <span class="block text-xs font-bold text-slate-600 peer-checked:text-emerald-700">Jugador</span>
                        </div>
                    </label>
                    <label class="relative cursor-pointer group">
                        <input type="radio" name="role" value="owner" class="peer sr-only">
                        <div class="p-4 border-2 border-slate-200 rounded-xl text-center group-hover:border-emerald-200 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition-all">
                            <i class="fas fa-store text-xl mb-2 text-slate-400 group-hover:text-emerald-500 peer-checked:text-emerald-600"></i>
                            <span class="block text-xs font-bold text-slate-600 peer-checked:text-emerald-700">Dueño</span>
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-100 transition-all active:scale-[0.98] mt-4 uppercase tracking-widest text-sm">
                Crear Mi Cuenta
            </button>
        </form>

        <div id="msg" class="mt-6 text-center text-sm font-medium hidden"></div>

        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <p class="text-slate-500 text-sm font-medium">¿Ya eres miembro? 
                <a href="login.html" class="text-emerald-600 font-black hover:underline">Inicia Sesión</a>
            </p>
        </div>
    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;
      const username = document.getElementById("regUsername").value;
      const name = document.getElementById("regName").value;
      const role = document.querySelector("input[name='role']:checked").value;
      const msgDiv = document.getElementById("msg");

      msgDiv.className = "mt-6 text-center text-sm font-medium p-3 rounded-xl bg-slate-100 text-slate-600";
      msgDiv.innerText = "Creando cuenta...";
      msgDiv.classList.remove("hidden");

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, username, name, role })
        });

        const data = await res.json();
        
        if (data.error) {
          msgDiv.innerText = data.error;
          msgDiv.className = "mt-6 text-center text-sm font-medium p-3 rounded-xl bg-red-50 text-red-600";
        } else {
          msgDiv.innerText = "¡Cuenta creada con éxito! Redirigiendo al login...";
          msgDiv.className = "mt-6 text-center text-sm font-medium p-3 rounded-xl bg-emerald-50 text-emerald-600";
          setTimeout(() => window.location.href = "login.html", 1500);
        }
      } catch (err) {
        msgDiv.innerText = "Error de conexión";
        msgDiv.className = "mt-6 text-center text-sm font-medium p-3 rounded-xl bg-red-50 text-red-600";
      }
    });
  </script>
</body>
</html>
