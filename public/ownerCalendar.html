<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario - MiReserva Owner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/scripts/tailwind-config.js" defer></script>
  <script src="/scripts/ui-components.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .calendar-day { min-height: 120px; transition: all 0.2s; }
    .calendar-day:hover { background-color: #f1f5f9; }
    .event-pill { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-top: 2px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="header-placeholder"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-6">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Calendario de Reservas</h1>
            <p class="text-slate-500 font-medium">Visualiza y gestiona la ocupación de tus canchas.</p>
        </div>
        
        <div class="flex items-center bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
            <button id="prevMonth" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-50 text-slate-600 transition">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div id="currentMonthLabel" class="px-6 font-black text-slate-800 min-w-[180px] text-center uppercase tracking-widest text-sm">
                Mayo 2024
            </div>
            <button id="nextMonth" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-50 text-slate-600 transition">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Calendar Grid -->
    <div class="bg-white rounded-3xl shadow-card border border-slate-100 overflow-hidden">
        <div class="grid grid-cols-7 bg-slate-50 border-b border-slate-100">
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Lun</div>
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Mar</div>
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Mié</div>
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Jue</div>
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Vie</div>
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Sáb</div>
            <div class="py-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Dom</div>
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 divide-x divide-y divide-slate-100">
            <!-- Days will be injected here -->
        </div>
    </div>
  </main>

  <!-- Day Detail Modal -->
  <div id="dayModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[80vh] overflow-hidden flex flex-col">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div>
                <h3 id="modalDateLabel" class="text-xl font-black text-slate-900">Detalles del día</h3>
                <p class="text-xs font-bold text-emerald-600 uppercase tracking-widest">Programación de Reservas</p>
            </div>
            <button onclick="closeModal()" class="w-10 h-10 rounded-xl hover:bg-white hover:shadow-sm text-slate-400 hover:text-red-500 transition flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex-grow overflow-y-auto p-6">
            <div id="modalContent" class="space-y-4">
                <!-- Detailed reservations for the day -->
            </div>
        </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    let currentDate = new Date();
    let allReservations = [];
    const token = localStorage.getItem('token');

    if (!token || localStorage.getItem('role') !== 'owner') {
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadReservations();
        document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };
    });

    async function loadReservations() {
        try {
            const response = await fetch('/owner/reservations', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            allReservations = data.reservations.filter(r => r.status !== 'cancelada');
            renderCalendar();
        } catch (err) { console.error(err); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const label = document.getElementById('currentMonthLabel');
        grid.innerHTML = '';

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        label.innerText = `${monthNames[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevMonthDays = new Date(year, month, 0).getDate();

        // Fill previous month days
        for (let i = adjustedFirstDay; i > 0; i--) {
            createDayCell(prevMonthDays - i + 1, true);
        }

        // Fill current month days
        for (let i = 1; i <= daysInMonth; i++) {
            createDayCell(i, false);
        }

        // Fill next month days to complete 42 cells
        const totalCells = 42;
        const remainingCells = totalCells - grid.children.length;
        for (let i = 1; i <= remainingCells; i++) {
            createDayCell(i, true);
        }
    }

    function createDayCell(dayNum, isOtherMonth) {
        const grid = document.getElementById('calendarGrid');
        const cell = document.createElement('div');
        cell.className = `calendar-day p-4 cursor-pointer ${isOtherMonth ? 'bg-slate-50/50 text-slate-300' : 'bg-white text-slate-700'}`;
        
        const date = new Date(currentDate.getFullYear(), currentDate.getMonth() + (isOtherMonth ? (dayNum > 20 ? -1 : 1) : 0), dayNum);
        const dayKey = date.toISOString().split('T')[0];
        
        const dayEvents = allReservations.filter(r => r.start_time.startsWith(dayKey));
        
        cell.innerHTML = `<div class="text-xs font-black mb-2">${dayNum}</div>`;
        
        if (dayEvents.length > 0) {
            const container = document.createElement('div');
            dayEvents.slice(0, 3).forEach(ev => {
                const pill = document.createElement('div');
                pill.className = `event-pill ${ev.status === 'confirmada' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`;
                pill.innerText = `${new Date(ev.start_time).getHours()}:00 ${ev.username}`;
                container.appendChild(pill);
            });
            if (dayEvents.length > 3) {
                const more = document.createElement('div');
                more.className = "text-[9px] font-bold text-slate-400 mt-1 pl-1";
                more.innerText = `+${dayEvents.length - 3} más`;
                container.appendChild(more);
            }
            cell.appendChild(container);
        }

        cell.onclick = () => showDayDetails(date, dayEvents);
        grid.appendChild(cell);
    }

    function showDayDetails(date, events) {
        const modal = document.getElementById('dayModal');
        const label = document.getElementById('modalDateLabel');
        const content = document.getElementById('modalContent');
        
        label.innerText = date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        content.innerHTML = '';

        if (events.length === 0) {
            content.innerHTML = `
                <div class="text-center py-10">
                    <i class="fas fa-calendar-check text-slate-100 text-5xl mb-4"></i>
                    <p class="text-slate-400 font-bold italic">No hay reservas para este día.</p>
                </div>
            `;
        } else {
            // Sort events by hour
            events.sort((a,b) => new Date(a.start_time) - new Date(b.start_time)).forEach(ev => {
                const start = new Date(ev.start_time);
                const end = new Date(ev.end_time);
                content.innerHTML += `
                    <div class="flex items-center gap-4 p-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition">
                        <div class="w-20 shrink-0 text-center">
                            <span class="block text-lg font-black text-slate-900">${start.getHours()}:00</span>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Hasta ${end.getHours()}:00</span>
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800">${ev.username}</h4>
                            <p class="text-xs font-medium text-slate-500">${ev.field_name}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${
                            ev.status === 'confirmada' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'
                        }">${ev.status}</span>
                    </div>
                `;
            });
        }

        modal.classList.remove('hidden');
    }

    function closeModal() { document.getElementById('dayModal').classList.add('hidden'); }
  </script>
</body>
</html>
